spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 5MB
  jpa:
    open-in-view: true
  config:
    import: classpath:application-db.yml

server:
  servlet:
    session:
      persistent: false
      cookie:
        secure: false
        http-only: true
        same-site: lax