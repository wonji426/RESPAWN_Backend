version: '3.8'

services:
  # 1. 데이터베이스 서비스 (MySQL)
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      # DB 이름, 계정명, 비밀번호 설정 (원하는 대로 수정하세요)
      - MYSQL_DATABASE=respawn
      - MYSQL_ROOT_PASSWORD=root4239
    volumes:
      # 컨테이너를 삭제해도 데이터가 유지되도록 내 PC의 폴더와 연결
      - ./mysql_data:/var/lib/mysql

  # Redis 설정 수정 ⭐
  redis:
      image: redis:latest
      container_name: redis-cache
      restart: always
      command: redis-server --requirepass admin4239  # 비밀번호를 'admin4239'로 설정
      ports:
        - "6379:6379"

  # 2. 스프링 부트 애플리케이션 서비스
  app:
    build: ./backend
    container_name: spring-app
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 위에서 설정한 'db' 서비스 이름을 호스트 주소로 사용합니다.
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/respawn?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root4239
      # JPA 설정 (테이블 자동 생성 옵션 등)
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create
      - SPRING_JPA_SHOW_SQL=true
      # Redis 연결 설정 추가 ⭐
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=admin4239
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create

  # 4. 리액트 서비스 (프론트엔드) ⭐ 새로 추가됨
  frontend:
    build: ./frontend # ⭐ frontend 폴더 안의 Dockerfile을 사용
    container_name: react-frontend
    ports:
      - "80:80"       # 브라우저에서 'IP주소'만 쳐서 들어오려면 80번 포트 권장
    depends_on:
      - app           # 백엔드가 먼저 실행되도록 설정